<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gengstr — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
    .login-wrap { width: 100%; max-width: 420px; padding: 1.25rem; }
    .login-brand { text-align: center; margin-bottom: 2rem; }
    .login-brand .logo { width: 52px; height: 52px; background: var(--brand); border-radius: 14px;
      display: flex; align-items: center; justify-content: center; margin: 0 auto .75rem; }
    .login-brand .logo svg { width: 28px; height: 28px; fill: white; }
    .login-brand h1 { font-size: 1.5rem; color: var(--text-primary); }
    .login-brand p  { font-size: .875rem; color: var(--text-muted); margin-top: .25rem; }
    .btn-google {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: .6rem;
      padding: .65rem 1rem; border: 1px solid var(--border); border-radius: var(--radius);
      background: white; font-size: .9rem; font-weight: 500; cursor: pointer;
      color: var(--text-primary); transition: background .15s; font-family: var(--font);
    }
    .btn-google:hover { background: var(--bg); }
    .btn-google img { width: 18px; height: 18px; }
    .register-link { text-align: center; margin-top: 1.25rem; font-size: .875rem; color: var(--text-muted); }
    .register-link a { color: var(--brand); text-decoration: none; font-weight: 500; }
    .register-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-brand">
      <div class="logo">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <h1>gengstr</h1>
      <p>Freelancer Management Platform</p>
    </div>

    <div class="card">
      <h2 style="margin-bottom:1.25rem;font-size:1.1rem">Sign in to your account</h2>

      <div id="alert-box" style="display:none;margin-bottom:1rem"></div>

      <!-- Email/Password Login -->
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group" style="margin-bottom:1.25rem">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="btn btn-primary btn-block btn-lg" id="btn-login">
        Sign in
      </button>

      <div class="divider" style="margin:1.25rem 0">or</div>

      <!-- Google Login -->
      <button class="btn-google" id="btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Continue with Google
      </button>
    </div>

    <div class="register-link">
      New here? <a href="register.html">Create a freelancer account →</a>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { redirectIfLoggedIn } from "./auth.js";
    import {
      signInWithEmailAndPassword,
      signInWithPopup,
      GoogleAuthProvider
    } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    // Redirect if already logged in
    redirectIfLoggedIn();

    const emailInput    = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const btnLogin      = document.getElementById("btn-login");
    const btnGoogle     = document.getElementById("btn-google");
    const alertBox      = document.getElementById("alert-box");

    function showAlert(msg, type = "error") {
      alertBox.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
      alertBox.style.display = "block";
    }

    function setLoading(loading) {
      btnLogin.disabled  = loading;
      btnGoogle.disabled = loading;
      btnLogin.textContent = loading ? "Signing in…" : "Sign in";
    }

    async function redirectByRole(uid) {
      const snap = await getDoc(doc(db, "users", uid));
      if (!snap.exists()) { showAlert("Account not found. Please register."); return; }
      const role = snap.data().role;
      if (role === "admin" || role === "pm") window.location.href = "dashboard.html";
      else if (role === "freelancer")        window.location.href = "profile.html";
      else showAlert("Unknown role. Contact admin.");
    }

    // Email / Password
    btnLogin.addEventListener("click", async () => {
      const email    = emailInput.value.trim();
      const password = passwordInput.value;
      if (!email || !password) { showAlert("Please enter your email and password."); return; }
      setLoading(true);
      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        await redirectByRole(cred.user.uid);
      } catch (e) {
        const msgs = {
          "auth/user-not-found":   "No account found with this email.",
          "auth/wrong-password":   "Incorrect password. Please try again.",
          "auth/invalid-email":    "Please enter a valid email address.",
          "auth/too-many-requests":"Too many attempts. Try again later."
        };
        showAlert(msgs[e.code] || "Login failed. Please try again.");
        setLoading(false);
      }
    });

    // Google
    btnGoogle.addEventListener("click", async () => {
      setLoading(true);
      try {
        const provider = new GoogleAuthProvider();
        const cred = await signInWithPopup(auth, provider);
        const snap = await getDoc(doc(db, "users", cred.user.uid));
        if (!snap.exists()) {
          // New Google user — create account and send to settings
          const { setDoc, serverTimestamp } = await import("https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js");
          await setDoc(doc(db, "users", cred.user.uid), {
            uid: cred.user.uid, email: cred.user.email,
            displayName: cred.user.displayName || "Freelancer",
            photoURL: cred.user.photoURL || "", role: "freelancer",
            isApproved: false, isActive: true, profileComplete: false,
            createdAt: serverTimestamp(), lastLoginAt: serverTimestamp()
          });
          await setDoc(doc(db, "freelancers", cred.user.uid), {
            fullName: cred.user.displayName || "Freelancer",
            phone:"",state:"",bio:"",languages:[],categoryIds:[],tags:[],
            experienceLevel:"",portfolioLinks:{behance:"",github:"",website:""},
            availability:"available",preferredProjectType:[],rateType:"per_project",
            rateMin:0,rateMax:0,minProjectBudget:0,bankName:"",bankAccountName:"",
            duitnowId:"",ssm:"",trustScore:0,totalProjectsCompleted:0,totalRatings:0,
            isVerified:false,isApproved:false,profileComplete:false,photoURL:"",
            createdAt:serverTimestamp(),updatedAt:serverTimestamp()
          });
          window.location.href = "settings.html";
          return;
        }
        await redirectByRole(cred.user.uid);
      } catch (e) {
        if (e.code !== "auth/popup-closed-by-user") {
          showAlert("Google sign-in failed. Please try again.");
        }
        setLoading(false);
      }
    });

    // Allow Enter key to submit
    [emailInput, passwordInput].forEach(el =>
      el.addEventListener("keydown", e => { if (e.key === "Enter") btnLogin.click(); })
    );
  </script>
</body>
</html>
