<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gengstr — Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); }
    .reg-wrap { width:100%; max-width:440px; padding:1.25rem; }
    .reg-brand { text-align:center; margin-bottom:2rem; }
    .logo { width:52px; height:52px; background:var(--brand); border-radius:14px;
      display:flex; align-items:center; justify-content:center; margin:0 auto .75rem; }
    .logo svg { width:28px; height:28px; fill:white; }
    .btn-google {
      width:100%; display:flex; align-items:center; justify-content:center; gap:.65rem;
      padding:.65rem 1rem; border:1px solid var(--border); border-radius:var(--radius);
      background:white; font-size:.9rem; font-weight:500; cursor:pointer;
      color:var(--text-primary); transition:background .15s; font-family:var(--font); margin-bottom:.75rem;
    }
    .btn-google:hover { background:var(--bg); }
    .btn-google img { width:18px; height:18px; }
    .or-divider { display:flex; align-items:center; gap:.75rem; color:var(--text-muted);
      font-size:.8rem; margin:.85rem 0; }
    .or-divider::before, .or-divider::after { content:''; flex:1; height:1px; background:var(--border); }
    .back-link { text-align:center; margin-top:1rem; font-size:.875rem; color:var(--text-muted); }
    .back-link a { color:var(--brand); text-decoration:none; font-weight:500; }
  </style>
</head>
<body>
<div class="reg-wrap">
  <div class="reg-brand">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <h1 style="font-size:1.5rem">Join gengstr</h1>
    <p style="margin-top:.25rem;font-size:.875rem">Create your account — you can complete your profile after.</p>
  </div>

  <div class="card">
    <div id="alert-box" style="display:none;margin-bottom:1rem"></div>

    <button class="btn-google" id="btn-google">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="">
      Continue with Google
    </button>

    <div class="or-divider">or sign up with email</div>

    <div class="form-group">
      <label for="fullname">Full name <span class="req">*</span></label>
      <input type="text" id="fullname" placeholder="Muhammad Ali bin Hassan" autocomplete="name">
    </div>
    <div class="form-group">
      <label for="email">Email address <span class="req">*</span></label>
      <input type="email" id="email" placeholder="you@email.com" autocomplete="email">
    </div>
    <div class="form-group" style="margin-bottom:1.25rem">
      <label for="password">Password <span class="req">*</span></label>
      <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password">
    </div>

    <button class="btn btn-primary btn-block btn-lg" id="btn-register">Create account</button>

    <p style="font-size:.78rem;color:var(--text-muted);text-align:center;margin-top:.85rem">
      By signing up, you agree to our terms of service.
    </p>
  </div>

  <div class="back-link">Already have an account? <a href="index.html">Sign in →</a></div>
</div>

<script type="module">
  import { auth, db } from "./firebase.js";
  import {
    createUserWithEmailAndPassword,
    signInWithPopup,
    GoogleAuthProvider,
    updateProfile
  } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
  import { doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  const alertBox  = document.getElementById("alert-box");
  const btnReg    = document.getElementById("btn-register");
  const btnGoogle = document.getElementById("btn-google");

  function showAlert(msg, type="error") {
    alertBox.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
    alertBox.style.display = "block";
  }
  function setLoading(on) {
    btnReg.disabled = btnGoogle.disabled = on;
    btnReg.textContent = on ? "Creating account…" : "Create account";
  }

  async function createUserDocs(uid, displayName, email) {
    const existing = await getDoc(doc(db, "users", uid));
    if (existing.exists()) { window.location.href = "profile.html"; return; }

    await setDoc(doc(db, "users", uid), {
      uid, email, displayName, photoURL: "",
      role: "freelancer",
      isApproved: false, isActive: true, profileComplete: false,
      createdAt: serverTimestamp(), lastLoginAt: serverTimestamp()
    });
    await setDoc(doc(db, "freelancers", uid), {
      fullName: displayName, phone: "", state: "", bio: "",
      languages: [], categoryIds: [], tags: [], experienceLevel: "",
      portfolioLinks: { behance:"", github:"", website:"" },
      availability: "available", preferredProjectType: [],
      rateType: "per_project", rateMin: 0, rateMax: 0, minProjectBudget: 0,
      bankName: "", bankAccountName: "", duitnowId: "", ssm: "",
      trustScore: 0, totalProjectsCompleted: 0, totalRatings: 0,
      isVerified: false, isApproved: false, profileComplete: false, photoURL: "",
      createdAt: serverTimestamp(), updatedAt: serverTimestamp()
    });
    window.location.href = "settings.html";
  }

  btnReg.addEventListener("click", async () => {
    const name  = document.getElementById("fullname").value.trim();
    const email = document.getElementById("email").value.trim();
    const pass  = document.getElementById("password").value;
    if (!name)           return showAlert("Please enter your full name.");
    if (!email)          return showAlert("Please enter your email address.");
    if (pass.length < 8) return showAlert("Password must be at least 8 characters.");
    setLoading(true);
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name });
      await createUserDocs(cred.user.uid, name, email);
    } catch(e) {
      const msgs = {
        "auth/email-already-in-use": "This email is already registered. <a href='index.html'>Sign in instead?</a>",
        "auth/weak-password": "Password is too weak.",
        "auth/invalid-email": "Please enter a valid email address."
      };
      showAlert(msgs[e.code] || "Registration failed: " + e.message);
      setLoading(false);
    }
  });

  btnGoogle.addEventListener("click", async () => {
    setLoading(true);
    try {
      const cred = await signInWithPopup(auth, new GoogleAuthProvider());
      await createUserDocs(cred.user.uid, cred.user.displayName || "Freelancer", cred.user.email);
    } catch(e) {
      if (e.code !== "auth/popup-closed-by-user") showAlert("Google sign-up failed. Please try again.");
      setLoading(false);
    }
  });

  ["fullname","email","password"].forEach(id =>
    document.getElementById(id).addEventListener("keydown", e => { if(e.key==="Enter") btnReg.click(); })
  );
</script>
</body>
</html>
